<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Prépa FPC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body{font-family:'Inter',sans-serif}
        .valid{color:#dc2626}
        .invalid{color:#94a3b8}
    </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 selection:bg-red-200 flex items-center justify-center p-4 relative">
    <div class="absolute inset-0 opacity-5" style="background-image:url(%22data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23000000' fill-opacity='1' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E%22)"></div>
    <div class="bg-white max-w-md w-full rounded-3xl shadow-2xl relative z-10 p-8 sm:p-10 border border-slate-100">
        <a href="index.html" class="absolute top-5 right-5 text-slate-400 hover:text-slate-800 transition bg-slate-50 hover:bg-slate-100 p-2 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></a>
        <div class="flex flex-col items-center mb-8">
            <div class="bg-red-600 text-white p-3 rounded-2xl shadow-sm mb-4"><i data-lucide="stethoscope" class="w-8 h-8"></i></div>
            <h1 class="text-2xl font-black text-slate-900 mb-1 text-center">Débutez votre essai de 7 jours</h1>
            <p class="text-slate-500 font-medium text-center">Commencez votre entraînement pour le concours FPC.</p>
        </div>
        <button type="button" class="w-full bg-white border border-slate-200 hover:bg-slate-50 hover:border-slate-300 text-slate-700 font-bold text-base py-3.5 rounded-xl transition-all shadow-sm flex items-center justify-center gap-3 mb-6"><svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>S'inscrire avec Google</button>
        <div class="relative flex items-center mb-6"><div class="flex-grow border-t border-slate-200"></div><span class="flex-shrink-0 mx-4 text-slate-400 text-xs font-bold uppercase tracking-wider">ou par email</span><div class="flex-grow border-t border-slate-200"></div></div>
        <form id="signup-form" class="space-y-4">
            <div><label for="firstname" class="block text-sm font-bold text-slate-700 mb-1.5">Prénom</label><div class="relative"><div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i data-lucide="user" class="w-5 h-5 text-slate-400"></i></div><input type="text" id="firstname" name="firstname" required placeholder="Marie" class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:bg-white focus:border-transparent outline-none transition font-medium"></div></div>
            <div><label for="email" class="block text-sm font-bold text-slate-700 mb-1.5">Adresse email</label><div class="relative"><div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i data-lucide="mail" class="w-5 h-5 text-slate-400"></i></div><input type="email" id="email" name="email" required placeholder="marie.as@hopital.fr" class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:bg-white focus:border-transparent outline-none transition font-medium"></div></div>
            <div><label for="password" class="block text-sm font-bold text-slate-700 mb-1.5">Mot de passe</label><div class="relative"><div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i data-lucide="lock" class="w-5 h-5 text-slate-400"></i></div><input type="password" id="password" name="password" required placeholder="••••••••" class="w-full pl-11 pr-12 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:bg-white focus:border-transparent outline-none transition font-medium"><button type="button" onclick="togglePass('password','eye-1')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 transition"><i data-lucide="eye" id="eye-1" class="w-5 h-5"></i></button></div><div class="mt-3 grid grid-cols-2 gap-y-1.5 text-xs font-bold"><div id="len" class="invalid flex items-center gap-1.5 transition-colors"><i data-lucide="circle-check" class="w-4 h-4"></i> 8+ caractères</div><div id="upper" class="invalid flex items-center gap-1.5 transition-colors"><i data-lucide="circle-check" class="w-4 h-4"></i> 1 Majuscule</div><div id="num" class="invalid flex items-center gap-1.5 transition-colors"><i data-lucide="circle-check" class="w-4 h-4"></i> 1 Chiffre</div><div id="spec" class="invalid flex items-center gap-1.5 transition-colors"><i data-lucide="circle-check" class="w-4 h-4"></i> 1 Caractère spécial</div></div></div>
            <div><label for="confirm_password" class="block text-sm font-bold text-slate-700 mb-1.5">Confirmer le mot de passe</label><div class="relative"><div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i data-lucide="lock" class="w-5 h-5 text-slate-400"></i></div><input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••" class="w-full pl-11 pr-12 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:bg-white focus:border-transparent outline-none transition font-medium"><button type="button" onclick="togglePass('confirm_password','eye-2')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 transition"><i data-lucide="eye" id="eye-2" class="w-5 h-5"></i></button></div><div id="match-error" class="hidden text-xs text-red-600 font-bold mt-1.5">Les mots de passe ne correspondent pas.</div></div>
            <button type="submit" id="submit-btn" disabled class="w-full bg-slate-200 text-slate-400 cursor-not-allowed font-bold text-lg py-4 rounded-xl mt-2 transition-all shadow-lg shadow-slate-200 flex items-center justify-center gap-2 group">Créer mon compte <i data-lucide="sparkles" class="w-5 h-5"></i></button>
        </form>
        <div class="mt-8 text-center border-t border-slate-100 pt-6"><p class="text-slate-500 font-medium text-sm">Déjà un compte ? <a href="login.html" class="text-red-600 font-bold hover:text-red-700 transition ml-1">Se connecter</a></p></div>
    </div>
    <script>
        lucide.createIcons();
        const pass=document.getElementById('password'),confirmPass=document.getElementById('confirm_password'),submitBtn=document.getElementById('submit-btn'),matchError=document.getElementById('match-error');
        const criteria={len:document.getElementById('len'),upper:document.getElementById('upper'),num:document.getElementById('num'),spec:document.getElementById('spec')};
        function togglePass(id,eyeId){const el=document.getElementById(id),eye=document.getElementById(eyeId);if(el.type==='password'){el.type='text';eye.setAttribute('data-lucide','eye-off')}else{el.type='password';eye.setAttribute('data-lucide','eye')}lucide.createIcons()}
        function validate(){const val=pass.value;const v={len:val.length>=8,upper:/[A-Z]/.test(val),num:/[0-9]/.test(val),spec:/[!@#$%^&*(),.?":{}|<>]/.test(val)};Object.keys(v).forEach(k=>{if(v[k]){criteria[k].classList.replace('invalid','valid')}else{criteria[k].classList.replace('valid','invalid')}});const allValid=Object.values(v).every(x=>x);const matches=val===confirmPass.value&&val!=="";if(confirmPass.value!==""&&!matches){matchError.classList.remove('hidden')}else{matchError.classList.add('hidden')}if(allValid&&matches){submitBtn.disabled=false;submitBtn.classList.remove('bg-slate-200','text-slate-400','cursor-not-allowed');submitBtn.classList.add('bg-slate-900','text-white','hover:bg-black','shadow-lg')}else{submitBtn.disabled=true;submitBtn.classList.add('bg-slate-200','text-slate-400','cursor-not-allowed');submitBtn.classList.remove('bg-slate-900','text-white','hover:bg-black','shadow-lg')}}
        pass.addEventListener('input',validate);confirmPass.addEventListener('input',validate);
        document.getElementById('signup-form').addEventListener('submit',(e)=>{e.preventDefault();alert("Compte créé avec succès ! Bienvenue sur Prépa FPC.")});
    </script>
</body>
</html>
